<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <style>
    /* Background Gradient Animation */
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      font-family: "Poppins", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(270deg, #667eea, #764ba2, #ff6cab, #ffa947);
      background-size: 800% 800%;
      animation: gradientBG 15s ease infinite;
    }

    @keyframes gradientBG {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    /* Signup Card */
    .signup-box {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 40px 35px;
      width: 380px;
      color: #fff;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
      text-align: center;
      animation: fadeInUp 1s ease;
    }

    @keyframes fadeInUp {
      from {opacity: 0; transform: translateY(30px);}
      to {opacity: 1; transform: translateY(0);}
    }

    .signup-box h2 {
      margin-bottom: 20px;
      font-weight: 600;
      font-size: 26px;
    }

    /* Floating Label Form */
    .form-group {
      position: relative;
      margin: 18px 0;
    }

    .form-group input {
      width: 100%;
      padding: 14px 12px;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.2);
      color: #fff;
      font-size: 15px;
      outline: none;
    }

    .form-group label {
      position: absolute;
      top: 50%;
      left: 12px;
      transform: translateY(-50%);
      color: #ddd;
      font-size: 14px;
      pointer-events: none;
      transition: 0.3s ease;
    }

    .form-group input:focus + label,
    .form-group input:not(:placeholder-shown) + label {
      top: 6px;
      font-size: 12px;
      color: #ffd369;
    }

    /* Button */
    .signup-box button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
      transition: transform 0.3s, background 0.3s;
    }

    .signup-box button:hover {
      transform: scale(1.05);
      background: linear-gradient(135deg, #5a67d8, #6b46c1);
    }

    /* Social Buttons */
    .social-login {
      margin: 20px 0;
    }

    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      margin: 8px 0;
      transition: 0.3s;
    }

    .google {
      background: #fff;
      color: #444;
    }

    .google:hover {
      background: #f0f0f0;
    }

    .facebook {
      background: #3b5998;
      color: #fff;
    }

    .facebook:hover {
      background: #324b84;
    }

    .signup-box p {
      margin-top: 12px;
      font-size: 14px;
    }

    .signup-box a {
      color: #ffd369;
      text-decoration: none;
      font-weight: 600;
    }

    /* Responsive */
    @media (max-width: 420px) {
      .signup-box {
        width: 90%;
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="signup-box">
    <h2>Create Account</h2>
    <form action="/signup" method="POST">
      <div class="form-group">
        <input type="text"  name="fullname" placeholder=" " required>
        <label>Full Name</label>
      </div>
      <div class="form-group">
        <input type="email"name="email" placeholder=" " required>
        <label>Email Address</label>
      </div>
      <div class="form-group">
        <input type="password" name="password" placeholder=" " required>
        <label>Password</label>
      </div>
      <div class="form-group">
        <input type="password" name="confirmPassword" placeholder=" " required>
        <label>Confirm Password</label>
      </div>
      <button type="submit">Sign Up</button>
    </form>

    <div class="social-login">
      <button type="button" class="social-btn google">
        <img src="https://img.icons8.com/color/20/000000/google-logo.png"/> Sign up with Google
      </button>
      <button type="button" class="social-btn facebook">
        <img src="https://img.icons8.com/ios-filled/20/ffffff/facebook-new.png"/> Sign up with Facebook
      </button>
    </div>

    <p>Already have an account? <a href="login">Login</a></p>
  </div>

 

  

</body>
</html>
