<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard | Car Hub</title>
    <link rel="stylesheet" href="home.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-color: #719def;
            --danger-color: #ff6b6b;
            --success-color: #4ade80;
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 20px;
            min-height: 80vh;
        }

        .profile-header {
            background: linear-gradient(135deg, #1a1f3a 0%, #2a3150 100%);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .profile-info h1 {
            color: white;
            font-size: 36px;
            margin: 0;
            text-shadow: 0 2px 10px rgba(113, 157, 237, 0.3);
        }

        .profile-info p {
            color: rgba(255, 255, 255, 0.6);
            margin: 10px 0 0 0;
            font-size: 18px;
        }

        .logout-btn {
            background: var(--danger-color);
            color: white;
            padding: 12px 25px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
        }

        .logout-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.5);
            filter: brightness(1.1);
        }

        .tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 15px;
            width: fit-content;
        }

        .tab-btn {
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--accent-color);
            color: white;
            box-shadow: 0 5px 15px rgba(113, 157, 237, 0.4);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .tab-content.active {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reg-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .reg-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
            background: rgba(255, 255, 255, 0.08);
        }

        .reg-card h3 {
            color: var(--accent-color);
            margin: 0 0 15px 0;
            font-size: 22px;
        }

        .reg-detail {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        .reg-detail span:first-child {
            color: rgba(255, 255, 255, 0.4);
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            background: var(--success-color);
            color: #0a0e27;
            margin-top: 15px;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 100px 0;
            color: rgba(255, 255, 255, 0.4);
        }

        .empty-state i {
            font-size: 64px;
            display: block;
            margin-bottom: 20px;
        }

        .loading-spinner {
            text-align: center;
            padding: 100px;
            color: white;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="logo">CAR HUB</div>
            <div class="nav-links">
                <a href="/home">Home</a>
                <a href="/services">Services</a>
                <a href="/stock">Buy Car</a>
                <a href="/sell">Sell Car</a>
                <a href="/profile">My Registrations</a>
            </div>
            <div class="search-bar">
                <a href="/logout" class="logout-btn" style="margin-left: 20px;">Logout</a>
            </div>
        </nav>

        <div class="dashboard-container">
            <header class="profile-header">
                <div class="profile-info">
                    <h1 id="welcome-msg">My Dashboard</h1>
                    <p>Track all your car registrations and activities</p>
                </div>
            </header>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('bookings')">Service Bookings</button>
                <button class="tab-btn" onclick="switchTab('sales')">My Listings</button>
                <button class="tab-btn" onclick="switchTab('purchases')">Purchased Cars</button>
            </div>

            <div id="bookings-content" class="tab-content active">
                <div class="loading-spinner">Loading your bookings...</div>
            </div>

            <div id="sales-content" class="tab-content">
                <div class="loading-spinner">Loading your listings...</div>
            </div>

            <div id="purchases-content" class="tab-content">
                <div class="loading-spinner">Loading your purchases...</div>
            </div>
        </div>

        <footer class="footer">
            <p>&copy; 2024 Car Hub. All rights reserved. | <a href="/contact">Contact Support</a></p>
        </footer>
    </div>

    <script>
        let registrations = {
            bookings: [],
            sales: [],
            purchases: []
        };

        async function fetchRegistrations() {
            try {
                const response = await fetch('/api/my-registrations');
                const data = await response.json();
                registrations = data;
                renderAll();
            } catch (err) {
                console.error('Error fetching data:', err);
                document.querySelectorAll('.loading-spinner').forEach(s => s.innerHTML = 'Error loading data. Please try again.');
            }
        }

        function renderAll() {
            renderBookings();
            renderSales();
            renderPurchases();
        }

        function renderBookings() {
            const container = document.getElementById('bookings-content');
            if (!registrations.bookings || registrations.bookings.length === 0) {
                container.innerHTML = `<div class="empty-state">No service bookings found. Start by booking a service!</div>`;
                return;
            }

            container.innerHTML = registrations.bookings.map(reg => `
                <div class="reg-card">
                    <h3>${reg.serviceType}</h3>
                    <div class="reg-detail"><span>Date:</span> <span>${reg.date}</span></div>
                    <div class="reg-detail"><span>Location:</span> <span>${reg.location || 'N/A'}</span></div>
                    <div class="reg-detail"><span>Wash Type:</span> <span>${reg.washType || 'Standard'}</span></div>
                    <div class="reg-detail"><span>Booked On:</span> <span>${new Date(reg.createdAt).toLocaleDateString()}</span></div>
                    <span class="status-badge">Confirmed</span>
                </div>
            `).join('');
        }

        function renderSales() {
            const container = document.getElementById('sales-content');
            if (!registrations.sales || registrations.sales.length === 0) {
                container.innerHTML = `<div class="empty-state">You haven't listed any cars for sale yet.</div>`;
                return;
            }

            container.innerHTML = registrations.sales.map(reg => `
                <div class="reg-card">
                    <h3>${reg.carName}</h3>
                    <div class="reg-detail"><span>Model:</span> <span>${reg.model}</span></div>
                    <div class="reg-detail"><span>Price:</span> <span>$${reg.rate.toLocaleString()}</span></div>
                    <div class="reg-detail"><span>Fuel:</span> <span>${reg.fuelType}</span></div>
                    <div class="reg-detail"><span>Listed On:</span> <span>${new Date(reg.createdAt).toLocaleDateString()}</span></div>
                    <span class="status-badge" style="background: var(--accent-color); color: white;">Active</span>
                </div>
            `).join('');
        }

        function renderPurchases() {
            const container = document.getElementById('purchases-content');
            if (!registrations.purchases || registrations.purchases.length === 0) {
                container.innerHTML = `<div class="empty-state">No car purchases found in your history.</div>`;
                return;
            }

            container.innerHTML = registrations.purchases.map(reg => `
                <div class="reg-card">
                    <h3>${reg.carDetails.carName}</h3>
                    <div class="reg-detail"><span>Model:</span> <span>${reg.carDetails.model}</span></div>
                    <div class="reg-detail"><span>Paid via:</span> <span>${reg.paymentMethod}</span></div>
                    <div class="reg-detail"><span>Price:</span> <span>$${reg.carDetails.rate.toLocaleString()}</span></div>
                    <div class="reg-detail"><span>Purchased On:</span> <span>${new Date(reg.createdAt).toLocaleDateString()}</span></div>
                    <span class="status-badge">Completed</span>
                </div>
            `).join('');
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(tab + '-content').classList.add('active');
        }

        // Initialize
        fetchRegistrations();
    </script>
</body>
</html>
