  <div class="filter-categories">
    <div>
      <label for="budgetSelect" style="font-weight: 600;">Budget</label>
      <select id="budgetSelect" onchange="updateDisplay('budgetDisplay', this.value)">
        <option value="">Select Budget</option>
        <option value="under10L">Under ₹10L</option>
        <option value="10-30L">₹10L - ₹30L</option>
        <option value="30Lplus">Above ₹30L</option>
      </select>
      <div id="budgetDisplay"></div>
    </div>

    <div>
      <label for="bodyTypeSelect">Body Type</label>
      <select id="bodyTypeSelect" onchange="updateDisplay('bodyTypeDisplay', this.value)">
        <option value="">Select Body Type</option>
        <option value="SUV">SUV</option>
        <option value="Sedan">Sedan</option>
        <option value="Hatchback">Hatchback</option>
        <option value="Coupe">Coupe</option>
      </select>
      <div id="bodyTypeDisplay"></div>
    </div>

    <div>
      <label for="fuelTypeSelect">Fuel Type</label>
      <select id="fuelTypeSelect" onchange="updateDisplay('fuelTypeDisplay', this.value)">
        <option value="">Select Fuel Type</option>
        <option value="Petrol">Petrol</option>
        <option value="Diesel">Diesel</option>
        <option value="Electric">Electric</option>
        <option value="Hybrid">Hybrid</option>
      </select>
      <div id="fuelTypeDisplay"></div>
    </div>
  </div>

  <div style="text-align: center; margin-top: 30px;">
    <button onclick="applyFilters()" class="filter-button">
      🔍 Apply Filters
    </button>
  </div>
